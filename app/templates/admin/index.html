{% extends "admin/base.html" %}
{% block title %} — Дашборд{% endblock %}
{% block content %}
<h1>Дашборд</h1>
<div style="display:grid;grid-template-columns:repeat(3,1fr);gap:16px;margin-bottom:32px;">
    <div style="background:white;border-radius:8px;padding:20px;box-shadow:0 1px 3px rgba(0,0,0,.1)">
        <div style="font-size:13px;color:#888">Пользователей</div>
        <div style="font-size:32px;font-weight:700;margin-top:4px">{{ stats.users }}</div>
    </div>
    <div style="background:white;border-radius:8px;padding:20px;box-shadow:0 1px 3px rgba(0,0,0,.1)">
        <div style="font-size:13px;color:#888">Питомцев</div>
        <div style="font-size:32px;font-weight:700;margin-top:4px">{{ stats.pets }}</div>
    </div>
    <div style="background:white;border-radius:8px;padding:20px;box-shadow:0 1px 3px rgba(0,0,0,.1)">
        <div style="font-size:13px;color:#888">Записей рациона</div>
        <div style="font-size:32px;font-weight:700;margin-top:4px">{{ stats.nutrition }}</div>
    </div>
</div>
{% if stats.nutrition == 0 %}
<div class="alert alert-error">
    База знаний пустая! <a href="/admin/nutrition" style="color:inherit;font-weight:600">Заполнить рацион →</a>
</div>
{% endif %}
{% endblock %}
