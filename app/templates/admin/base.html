<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PetFeed Admin{% block title %}{% endblock %}</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: system-ui, sans-serif; background: #f5f5f5; color: #333; }
        nav { background: #1a1a2e; color: white; padding: 14px 24px; display: flex; align-items: center; gap: 24px; }
        nav a { color: #aaa; text-decoration: none; font-size: 14px; }
        nav a:hover, nav a.active { color: white; }
        nav .logo { font-weight: 700; font-size: 18px; color: white; margin-right: 16px; }
        .container { max-width: 1100px; margin: 32px auto; padding: 0 16px; }
        h1 { font-size: 22px; margin-bottom: 20px; }
        table { width: 100%; border-collapse: collapse; background: white; border-radius: 8px; overflow: hidden; box-shadow: 0 1px 3px rgba(0,0,0,.1); }
        th { background: #f0f0f0; text-align: left; padding: 10px 14px; font-size: 13px; color: #555; }
        td { padding: 10px 14px; font-size: 14px; border-top: 1px solid #eee; }
        tr:hover td { background: #fafafa; }
        .badge { display: inline-block; padding: 2px 8px; border-radius: 12px; font-size: 12px; font-weight: 600; }
        .badge-on { background: #d1fae5; color: #065f46; }
        .badge-off { background: #fee2e2; color: #991b1b; }
        .btn { display: inline-block; padding: 6px 14px; border-radius: 6px; font-size: 13px; cursor: pointer; border: none; text-decoration: none; }
        .btn-primary { background: #4f46e5; color: white; }
        .btn-danger { background: #ef4444; color: white; }
        .btn-sm { padding: 4px 10px; font-size: 12px; }
        .alert { padding: 12px 16px; border-radius: 6px; margin-bottom: 16px; font-size: 14px; }
        .alert-success { background: #d1fae5; color: #065f46; }
        .alert-error { background: #fee2e2; color: #991b1b; }
        form { display: inline; }
    </style>
</head>
<body>
<nav>
    <span class="logo">🐾 PetFeed Admin</span>
    <a href="/admin/">Дашборд</a>
    <a href="/admin/users">Пользователи</a>
    <a href="/admin/flags">Feature Flags</a>
    <a href="/admin/nutrition">Рацион</a>
</nav>
<div class="container">
    {% if msg %}
    <div class="alert alert-success">{{ msg }}</div>
    {% endif %}
    {% block content %}{% endblock %}
</div>
</body>
</html>
